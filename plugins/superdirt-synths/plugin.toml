name        = "superdirt-synths"
version     = "0.1.0"
description = "SynthDefs that actually ship with this vendored SuperDirt"

# Only declares names that exist as SynthDefs in either:
#   - SuperDirt/synths/default-synths.scd (always loaded)
#   - SuperDirt/library/default-synths-extra.scd (loaded if sc3-plugins
#     is installed — the Nix flake uses supercollider-with-sc3-plugins)
#
# `sin`, `square`, `saw`, `tri`, `fm` were on this list before — they
# don't exist in vanilla SuperDirt. They sometimes appear in TidalCycles
# tutorials as user-added synthdefs; users can add them via a personal
# plugin's `[synthdefs]` section.

# ── default-synths.scd (always available) ────────────────────────────

[synths.psin]
tags        = ["pulse", "sine", "soft"]
description = "pulse-modulated sine — soft attack, audible alternative to a missing 'sin'"

[synths.pmsin]
tags        = ["pm", "sine"]
description = "PM sine"

[synths.imp]
tags        = ["impulse", "click"]
description = "filtered impulse — short, sharp"

[synths.gabor]
tags        = ["grain", "tone"]
description = "Gabor wavelet — short tonal grain"

[synths.dirac]
tags        = ["click", "impulse"]
description = "dirac impulse — single sample click"

[synths.cyclo]
tags        = ["chiptune", "modulated"]
description = "cycling waveform"

# ── default-synths-extra.scd (needs sc3-plugins, present via flake) ──

[synths.super808]
tags        = ["drum", "808", "kick"]
description = "TR-808 style kick"

[synths.supersnare]
tags        = ["drum", "snare"]
description = "snappy snare synth"

[synths.superkick]
tags        = ["drum", "kick"]
description = "kick drum synth"

[synths.superhat]
tags        = ["drum", "hat"]
description = "hi-hat synth"

[synths.superclap]
tags        = ["drum", "clap"]
description = "clap synth"

[synths.superpiano]
tags        = ["piano", "keys"]
description = "synth piano"

[synths.superhammond]
tags        = ["organ", "keys"]
description = "Hammond-esque organ"

[synths.supermandolin]
tags        = ["strings", "pluck"]
description = "mandolin pluck"

[synths.superhex]
tags        = ["hex", "tone"]
description = "hexagonal membrane synth"

[synths.supersaw]
tags        = ["saw", "lead"]
description = "detuned super-saw lead"

[synths.supersquare]
tags        = ["square", "lead"]
description = "detuned super-square lead"

[synths.superpwm]
tags        = ["pwm", "lead"]
description = "pulse-width-modulation lead"

[synths.superchip]
tags        = ["chip", "8bit"]
description = "chiptune-style lead"

[synths.supernoise]
tags        = ["noise"]
description = "filtered noise burst"

[synths.superfork]
tags        = ["bell", "fork"]
description = "tuning-fork bell"

[synths.supervibe]
tags        = ["vibraphone"]
description = "vibraphone"

[synths.superhoover]
tags        = ["hoover", "rave"]
description = "classic rave hoover"

[synths.superzow]
tags        = ["zow", "fx"]
description = "ascending FX"

[synths.superstatic]
tags        = ["static", "noise"]
description = "static noise"

[synths.supergrind]
tags        = ["grind", "rough"]
description = "grinding texture"

[synths.superreese]
tags        = ["bass", "reese"]
description = "Reese-style bass"

[synths.superfm]
tags        = ["fm", "synth"]
description = "FM synth"

[synths.supercomparator]
tags        = ["comp", "fold"]
description = "comparator/wave-folder"

[synths.supersiren]
tags        = ["siren"]
description = "siren glide"

[synths.supergong]
tags        = ["gong", "metallic"]
description = "metallic gong"

[synths.supertron]
tags        = ["tron", "string"]
description = "Tron-style strings"

[synths.superwavemechanics]
tags        = ["physical", "modal"]
description = "wave-mechanics modal synth"

[synths.superprimes]
tags        = ["primes", "tone"]
description = "prime-numbered partials"

[synths.soskick]
tags        = ["drum", "kick", "sub"]
description = "sub kick"

[synths.soshats]
tags        = ["drum", "hat"]
description = "alt hat"
